default_stages: [pre-commit]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v14.0.0
    hooks:
      - id: clang-format
        types_or: [c++, c]

  - repo: local
    hooks:
      - id: julia-formatter
        name: JuliaFormatter
        description: "Run JuliaFormatter on staged Julia files."
        entry: julia --project=. -e 'using JuliaFormatter; format(ARGS, verbose=true)'
        language: system
        types: [julia]

      - id: update-githash
        name: Update .githash
        description: "Write the current git commit hash to .githash"
        entry: bash -c 'git rev-parse HEAD > .githash'
        language: system
        always_run: true
        pass_filenames: false
        stages: [post-commit]
